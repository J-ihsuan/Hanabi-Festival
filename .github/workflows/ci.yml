name: React CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository to the virtual machine
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    
    # 3. Test Hanabi 2 (Server Startup Test)
    - name: Install and Test Server
      working-directory: ./Hanabi-v2
      run: |
        npm install
        
        # Start the server in the background
        npm start &
        
        # Wait for 3 seconds to ensure the server is fully running
        sleep 3
        
        # Test if the server responds correctly (Assuming port 3000)
        curl -f http://localhost:3000 || exit 1
        echo "Hanabi-v2 server test passed successfully!"


    # 4. Test Hanabi 3 (Build JSX and Server Startup Test)
    - name: Build JSX and Test Server
      working-directory: ./Hanabi-v3
      run: |
        npm install
        
        # Compile the JSX file to standard JavaScript
        npx babel main.jsx --out-file main.js --presets=@babel/preset-react
        echo "Hanabi-v3 JSX compilation passed!"
        
        # Start the server in the background
        npm start &
        
        # Wait for 3 seconds to ensure the server is fully running
        sleep 3
        
        # Test if the server responds correctly
        curl -f http://localhost:3000 || exit 1
        echo "Hanabi-v3 server test passed successfully!"

  # 4. Test Hanabi 4 (Build TypeScript and Server Startup Test)
    - name: Build TypeScript and Test Server
      working-directory: ./Hanabi-v4
      run: |
        npm install
        
        # Compile the TSC file to standard JavaScript
        npx tsc main.ts
        echo "Hanabi-v4 TSC compilation passed!"
        
        # Start the server in the background
        npm start &
        
        # Wait for 3 seconds to ensure the server is fully running
        sleep 3
        
        # Test if the server responds correctly
        curl -f http://localhost:3000 || exit 1
        echo "Hanabi-v4 server test passed successfully!"